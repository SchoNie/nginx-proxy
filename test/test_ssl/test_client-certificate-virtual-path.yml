services:
  mtls-vpath-enabled:
    image: web
    expose:
      - "84"
    environment:
      WEB_PORTS: "84"
      VIRTUAL_HOST: "mtls-enabled.nginx-proxy.tld"
      VIRTUAL_PATH: /bar/
      VIRTUAL_DEST: /

  mtls-vpath-optional:
    image: web
    expose:
      - "85"
    environment:
      WEB_PORTS: "85"
      VIRTUAL_HOST_MULTIPORTS: |-
        mtls-optional.nginx-proxy.tld:
          "/bar":
            dest: "/"
          "/foo":
            dest: "/"
    labels:
      com.github.nginx-proxy.nginx-proxy.ssl_verify_client: "optional"

  nginx-proxy:
    volumes:
      - ${PYTEST_MODULE_PATH}/certs/mtls-optional.nginx-proxy.tld_6dbd548cc03e44b8b44b6e68e56255ce4273ae49_location:/etc/nginx/vhost.d/mtls-optional.nginx-proxy.tld_6dbd548cc03e44b8b44b6e68e56255ce4273ae49_location:ro